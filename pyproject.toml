[tool.ruff]
line-length = 100
target-version = "py38"
extend-exclude = ["graphify-out", ".remember", ".planning"]

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "UP",  # pyupgrade
]
ignore = [
    "E501",  # line-too-long — handled by formatter where possible
    "B008",  # function calls in defaults (common in discord.py)
    # Pre-existing issues to address as follow-up PRs:
    "E722",  # bare except — src/utils/blue_tracker.py
    "F841",  # unused variable — src/utils/blue_tracker.py
    "B007",  # unused loop control variable — src/utils/embeds.py
]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["B"]

[tool.pytest.ini_options]
minversion = "7.0"
testpaths = ["tests"]
python_files = ["test_*.py"]
addopts = "-ra --strict-markers"
